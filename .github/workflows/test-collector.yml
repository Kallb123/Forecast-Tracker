name: Test (collector)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/test-collector.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Syntax check
        run: find src -name '*.js' -exec node --check {} \;
      - name: Smoke test (dry run)
        env:
          DRY_RUN: "true"
          LATITUDE: "51.5"
          LONGITUDE: "-0.1"
        run: npm run smoke
